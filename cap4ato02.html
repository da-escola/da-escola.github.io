<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <style>
        table {
            width: 80%; /* Faz a tabela ocupar 80% da tela em vez de ficar esmagada no canto */
            border-collapse: collapse; /* Transforma as bordas duplas e feias em uma linha fina e bonita */
            margin: 20px 0; /* Dá um espaço entre o título e a tabela */
        }
        
        th, td {
            padding: 15px; /* CRIA O ESPAÇO INTERNO! Tente mudar para 20px ou 10px para ver a diferença */
            text-align: center; /* Centraliza o texto dentro dos quadradinhos */
        }
        
        th {
            background-color: #5c0176; /* Coloca um fundo cinza clarinho apenas no cabeçalho dos dias da semana */
        }
        td{ background-color: #5d017666;}
    </style>
