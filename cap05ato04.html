<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>
<body>
  <header>
    <h1>AT04 — Inscrição em Evento</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>
  <main>
    <form action="https://httpbin.org/post" method="POST" enctype="multipart/form-data">
      
      <fieldset>
        <legend>Identificação do participante</legend>
        
        <div>
          <label for="nome">Nome completo:</label>
          <input type="text" id="nome" name="nome" required>
        </div>
        
        <div>
          <label for="email">E-mail institucional:</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div>
          <label for="cidade">Cidade de origem:</label>
          <input type="text" id="cidade" name="cidade" list="cidades_alagoas">
          <datalist id="cidades_alagoas">
            <option value="Maceió"></option>
            <option value="Arapiraca"></option>
            <option value="Rio Largo"></option>
            <option value="Palmeira dos Índios"></option>
            <option value="União dos Palmares"></option>
            <option value="Penedo"></option>
            <option value="São Miguel dos Campos"></option>
            <option value="Delmiro Gouveia"></option>
          </datalist>
        </div>
        
        <div>
          <label for="foto">Foto para crachá:</label>
          <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="dica-foto">
          <br><small id="dica-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
        </div>
      </fieldset>

      <fieldset>
        <legend>Preferências para o evento</legend>
        
        <div>
          <label for="chegada">Data e hora preferida para chegada:</label>
          <input type="datetime-local" id="chegada" name="chegada">
        </div>

        <div>
          <label for="experiencia">Nível de experiência: <span id="valor-experiencia">5</span>/10</label><br>
          <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5" oninput="document.getElementById('valor-experiencia').textContent = this.value">
        </div>

        <div>
          <label for="cor_camiseta">Cor de preferência para a camiseta:</label>
          <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8">
        </div>

        <div>
          <label for="oficinas">Oficinas de interesse:</label><br>
          <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="dica-oficina">
            <option value="html5">HTML5 Avançado</option>
            <option value="css3">CSS3 e Animações</option>
            <option value="js_dom">JavaScript e Manipulação do DOM</option>
            <option value="acessibilidade">Acessibilidade na Web</option>
            <option value="react">Introdução ao React</option>
          </select>
          <br><small id="dica-oficina">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
        </div>
      </fieldset>

      <input type="hidden" name="edicao" value="2026">
      
      <div>
        <button type="submit">Confirmar inscrição</button>
      </div>

    </form>
  </main>
</body>
</html>
