<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>
<body>
  <header>
    <h1>AT03 — Matrícula Acadêmica</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>
  <main>
    <p><em>* Campos obrigatórios</em></p>
    
    <form action="https://httpbin.org/post" method="POST">
      
      <fieldset>
        <legend>Dados Pessoais</legend>
        <div>
          <label for="nome">Nome completo *:</label>
          <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">
        </div>
        <div>
          <label for="cpf">CPF *:</label>
          <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" title="CPF no formato 000.000.000-00">
        </div>
        <div>
          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999">
        </div>
        <div>
          <label for="email">E-mail *:</label>
          <input type="email" id="email" name="email" required>
        </div>
      </fieldset>

      <fieldset>
        <legend>Dados Acadêmicos</legend>
        <div>
          <label for="curso">Curso pretendido *:</label>
          <select id="curso" name="curso" required>
            <option value="">-- Selecione um curso --</option>
            <optgroup label="Computação">
              <option value="sistemas">Sistemas de Informação</option>
              <option value="ciencia">Ciência da Computação</option>
              <option value="engenharia">Engenharia da Computação</option>
            </optgroup>
            <optgroup label="Gestão">
              <option value="administracao">Administração</option>
              <option value="contabeis">Ciências Contábeis</option>
            </optgroup>
          </select>
        </div>
        
        <fieldset>
          <legend>Período *</legend>
          <input type="radio" id="per_manha" name="periodo" value="manha" required> <label for="per_manha">Manhã</label>
          <input type="radio" id="per_tarde" name="periodo" value="tarde" required> <label for="per_tarde">Tarde</label>
          <input type="radio" id="per_noite" name="periodo" value="noite" required> <label for="per_noite">Noite</label>
        </fieldset>

        <div>
          <label for="ano_ingresso">Ano de ingresso pretendido *:</label>
          <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required>
        </div>
      </fieldset>

      <fieldset>
        <legend>Áreas de Interesse</legend>
        <div>
          <input type="checkbox" id="int_web" name="interesses[]" value="web"> <label for="int_web">Desenvolvimento Web</label><br>
          <input type="checkbox" id="int_bd" name="interesses[]" value="banco_dados"> <label for="int_bd">Banco de Dados</label><br>
          <input type="checkbox" id="int_ai" name="interesses[]" value="ia"> <label for="int_ai">Inteligência Artificial</label><br>
          <input type="checkbox" id="int_seg" name="interesses[]" value="seguranca"> <label for="int_seg">Segurança da Informação</label><br>
          <input type="checkbox" id="int_infra" name="interesses[]" value="infra"> <label for="int_infra">Infraestrutura</label>
        </div>
      </fieldset>

      <div>
        <button type="submit">Solicitar matrícula</button>
        <button type="reset">Limpar formulário</button>
      </div>

    </form>
  </main>
</body>
</html>
